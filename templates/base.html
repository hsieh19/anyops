<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anyops Lite</title>
    <!-- Tailwind CSS (CDN for development) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: '#0f172a', /* slate-900 */
                        darker: '#020617', /* slate-950 */
                        card: 'rgba(30, 41, 59, 0.7)', /* glassmorphism base */
                    }
                }
            }
        }
    </script>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.11"></script>
    <!-- Icons (Lucide) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* Glassmorphism utility */
        .glass {
            background-color: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        /* Sidebar active link style */
        .nav-link.active {
            background-color: rgba(59, 130, 246, 0.1); /* blue-500 with opacity */
            border-left: 4px solid #3b82f6; /* blue-500 */
            color: #fff;
        }

        /* HTMX indicator animation */
        .htmx-indicator{
            display:none;
        }
        .htmx-request .htmx-indicator{
            display:inline-block;
        }
        .htmx-request.htmx-indicator{
            display:inline-block;
        }
    </style>
</head>
<body class="bg-darker text-slate-300 antialiased font-sans flex h-screen overflow-hidden">

    <!-- Sidebar Navigation -->
    <aside class="w-64 bg-dark border-r border-slate-800 flex flex-col transition-all duration-300 z-20 shrink-0">
        <!-- Logo Area -->
        <div class="h-16 flex items-center px-6 border-b border-slate-800">
            <div class="w-8 h-8 rounded bg-gradient-to-br from-blue-500 to-cyan-400 flex items-center justify-center mr-3 shadow-[0_0_15px_rgba(59,130,246,0.5)]">
                <i data-lucide="network" class="w-5 h-5 text-white"></i>
            </div>
            <span class="text-white font-bold tracking-wider text-lg">Anyops Lite</span>
        </div>

        <!-- Navigation Links -->
        <!-- We use hx-target="#main-content" to swap the content in the right pane -->
        <nav class="flex-1 overflow-y-auto py-4 space-y-1">
            
            <a href="#" class="nav-link active flex items-center px-6 py-3 text-sm font-medium hover:bg-slate-800/50 hover:text-white transition-colors"
               hx-get="/views/dashboard" 
               hx-target="#main-content" 
               hx-push-url="false"
               onclick="document.querySelectorAll('.nav-link').forEach(l=>l.classList.remove('active')); this.classList.add('active');">
                <i data-lucide="layout-dashboard" class="w-5 h-5 mr-3 text-slate-400"></i>
                仪表盘 (Dashboard)
            </a>

            <a href="#" class="nav-link flex items-center px-6 py-3 text-sm font-medium hover:bg-slate-800/50 hover:text-white transition-colors text-slate-400"
               hx-get="/views/overview" 
               hx-target="#main-content"
               hx-push-url="false"
               onclick="document.querySelectorAll('.nav-link').forEach(l=>l.classList.remove('active')); this.classList.add('active');">
                <i data-lucide="monitor" class="w-5 h-5 mr-3 text-slate-400"></i>
                设备概览 (Overview)
            </a>

            <a href="#" class="nav-link flex items-center px-6 py-3 text-sm font-medium hover:bg-slate-800/50 hover:text-white transition-colors text-slate-400"
               hx-get="/views/devices" 
               hx-target="#main-content"
               hx-push-url="false"
               onclick="document.querySelectorAll('.nav-link').forEach(l=>l.classList.remove('active')); this.classList.add('active');">
                <i data-lucide="server" class="w-5 h-5 mr-3 text-slate-400"></i>
                设备管理 (Devices)
            </a>

            <a href="#" class="nav-link flex items-center px-6 py-3 text-sm font-medium hover:bg-slate-800/50 hover:text-white transition-colors text-slate-400"
               hx-get="/views/credentials" 
               hx-target="#main-content"
               hx-push-url="false"
               onclick="document.querySelectorAll('.nav-link').forEach(l=>l.classList.remove('active')); this.classList.add('active');">
                <i data-lucide="key" class="w-5 h-5 mr-3 text-slate-400"></i>
                凭据管理 (Credentials)
            </a>

            <a href="#" class="nav-link flex items-center px-6 py-3 text-sm font-medium hover:bg-slate-800/50 hover:text-white transition-colors text-slate-400"
               hx-get="/views/logs" 
               hx-target="#main-content"
               hx-push-url="false"
               onclick="document.querySelectorAll('.nav-link').forEach(l=>l.classList.remove('active')); this.classList.add('active');">
                <i data-lucide="scroll-text" class="w-5 h-5 mr-3 text-slate-400"></i>
                日志中心 (Logs)
            </a>

            <a href="#" class="nav-link flex items-center px-6 py-3 text-sm font-medium hover:bg-slate-800/50 hover:text-white transition-colors text-slate-400"
               hx-get="/views/tasks" 
               hx-target="#main-content"
               hx-push-url="false"
               onclick="document.querySelectorAll('.nav-link').forEach(l=>l.classList.remove('active')); this.classList.add('active');">
                <i data-lucide="clipboard-list" class="w-5 h-5 mr-3 text-slate-400"></i>
                任务管理 (Tasks)
            </a>

            <a href="#" class="nav-link flex items-center px-6 py-3 text-sm font-medium hover:bg-slate-800/50 hover:text-white transition-colors text-slate-400"
               hx-get="/views/users" 
               hx-target="#main-content"
               hx-push-url="false"
               onclick="document.querySelectorAll('.nav-link').forEach(l=>l.classList.remove('active')); this.classList.add('active');">
                <i data-lucide="users" class="w-5 h-5 mr-3 text-slate-400"></i>
                用户管理 (Users)
            </a>

        </nav>

        <!-- Bottom Settings -->
        <div class="p-4 border-t border-slate-800">
            <a href="#" class="flex items-center px-2 py-2 text-sm font-medium text-slate-400 hover:text-white transition-colors">
                <i data-lucide="settings" class="w-5 h-5 mr-3"></i>
                系统设置
            </a>
            <div class="mt-4 flex items-center px-2">
                <div class="w-8 h-8 rounded-full bg-slate-700 flex items-center justify-center text-white font-bold text-xs">AD</div>
                <div class="ml-3">
                    <p class="text-sm font-medium text-white">Admin</p>
                    <p class="text-xs text-slate-500">Administrator</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col relative min-w-0 overflow-hidden">
        
        <!-- Header area for main context (optional breadcrumbs) -->
        <header class="h-16 flex items-center justify-between px-8 z-10 glass border-b-0">
            <h1 class="text-xl font-semibold text-white tracking-wide" id="page-title">系统概览</h1>
            
            <div class="flex items-center">
                <!-- HTMX Loading Indicator -->
                <i data-lucide="loader-2" class="w-5 h-5 animate-spin text-blue-400 mr-4 htmx-indicator" id="global-loader"></i>
                
                <button class="p-2 rounded-full hover:bg-slate-800 transition-colors text-slate-400 hover:text-white">
                    <i data-lucide="bell" class="w-5 h-5"></i>
                </button>
            </div>
        </header>

        <!-- Dynamic Content injected here by HTMX -->
        <!-- We trigger an initial load of the dashboard when the page boots -->
        <div id="main-content" class="flex-1 overflow-y-auto p-8" hx-get="/views/dashboard" hx-trigger="load">
            <!-- Dashboard content will be injected here on load -->
        </div>
        
    </main>

    <!-- Modal Container for HTMX injections -->
    <div id="modal-container"></div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();
        
        // Re-initialize icons after HTMX swaps new content
        document.body.addEventListener('htmx:afterSwap', function() {
            lucide.createIcons();
        });
    </script>
</body>
</html>
