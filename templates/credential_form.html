<div id="cred-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm animate-in fade-in duration-200">
    <div class="glass w-full max-w-md rounded-xl border border-slate-700 shadow-2xl overflow-hidden">
        <div class="px-6 py-4 border-b border-slate-700 flex justify-between items-center bg-slate-800/50">
            <h3 class="text-lg font-medium text-white">{% if credential %}编辑认证凭据{% else %}添加认证凭据{% endif %}</h3>
            <button onclick="document.getElementById('cred-modal').remove()" class="text-slate-400 hover:text-white">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>

        <form hx-post="{% if credential %}/api/credentials/{{ credential.id }}{% else %}/api/credentials{% endif %}" 
              hx-target="#main-content" 
              hx-on::after-request="document.getElementById('cred-modal').remove()" 
              class="p-6 space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-400 mb-1">凭据名称</label>
                <input type="text" name="name" required placeholder="如: 交换机通用口令" value="{{ credential.name if credential else '' }}"
                       class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-400 mb-1">认证类型</label>
                <select name="type" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500"
                        onchange="const val = this.value; document.getElementById('pass-field').style.display = val === 'password' ? 'block' : 'none'; document.getElementById('key-field').style.display = val === 'key' ? 'block' : 'none';">
                    <option value="password" {% if credential and credential.type == 'password' %}selected{% endif %}>账号密码 (Telnet/SSH)</option>
                    <option value="key" {% if credential and credential.type == 'key' %}selected{% endif %}>SSH 密钥</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-400 mb-1">用户名</label>
                <input type="text" name="username" required placeholder="admin" value="{{ credential.username if credential else '' }}"
                       class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500">
            </div>

            <div id="pass-field" style="display: {{ 'none' if credential and credential.type == 'key' else 'block' }};">
                <label class="block text-sm font-medium text-slate-400 mb-1">登录密码</label>
                <input type="password" name="password" placeholder="请输入密码" value="{{ credential.password if credential else '' }}"
                       class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500">
            </div>

            <div id="key-field" style="display: {{ 'block' if credential and credential.type == 'key' else 'none' }};">
                <label class="block text-sm font-medium text-slate-400 mb-1">私钥内容 (Private Key)</label>
                <textarea name="private_key" rows="4" placeholder="-----BEGIN RSA PRIVATE KEY-----" 
                          class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-xs font-mono text-slate-300 focus:outline-none focus:border-blue-500">{{ credential.private_key if credential else '' }}</textarea>
            </div>

            <div class="pt-4 flex justify-end space-x-3">
                <button type="button" onclick="document.getElementById('cred-modal').remove()" class="px-4 py-2 text-slate-400 hover:bg-slate-800 rounded-lg text-sm">取消</button>
                <button type="submit" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded-lg text-sm font-medium shadow-lg shadow-blue-500/20">
                    {% if credential %}保存修改{% else %}保存凭据{% endif %}
                </button>
            </div>
        </form>
    </div>
</div>
