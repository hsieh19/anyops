<script>
    document.getElementById('page-title').innerText = '凭据与密钥管理';
</script>

<div class="flex justify-between items-center mb-6">
    <div class="relative w-64">
        <i data-lucide="search" class="w-4 h-4 text-slate-500 absolute left-3 top-1/2 transform -translate-y-1/2"></i>
        <input type="text" name="q" placeholder="搜索凭据名称..." 
               value="{{ q or '' }}"
               autofocus
               onfocus="var val=this.value; this.value=''; this.value=val;"
               hx-get="/views/credentials"
               hx-trigger="keyup changed delay:500ms, search"
               hx-target="#main-content"
               class="w-full bg-dark border border-slate-700 rounded-lg pl-10 pr-4 py-2 text-sm text-white focus:outline-none focus:border-blue-500 transition-colors">
    </div>
    <button class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg flex items-center text-sm font-medium transition-all shadow-[0_0_15px_rgba(59,130,246,0.3)]"
            hx-get="/views/credentials/new" hx-target="#modal-container">
        <i data-lucide="plus" class="w-4 h-4 mr-2"></i>
        添加凭据
    </button>
</div>

<div class="glass rounded-xl border border-slate-700 overflow-hidden shadow-xl">
    <table class="w-full text-left text-sm text-slate-400">
        <thead class="text-xs text-slate-500 uppercase bg-slate-900/50 border-b border-slate-700">
            <tr>
                <th class="px-6 py-4 font-medium">凭据名称</th>
                <th class="px-6 py-4 font-medium">类型</th>
                <th class="px-6 py-4 font-medium">用户名</th>
                <th class="px-6 py-4 font-medium">认证内容</th>
                <th class="px-6 py-4 font-medium text-right">操作</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-slate-800/50">
            {% for cred in credentials %}
            <tr class="hover:bg-slate-800/40 transition-colors">
                <td class="px-6 py-4 font-medium text-slate-200">{{ cred.name }}</td>
                <td class="px-6 py-4">
                    {% if cred.type == 'password' %}
                    <span class="flex items-center text-emerald-400">
                        <i data-lucide="lock" class="w-3.5 h-3.5 mr-1.5"></i> 账号密码
                    </span>
                    {% else %}
                    <span class="flex items-center text-blue-400">
                        <i data-lucide="file-key" class="w-3.5 h-3.5 mr-1.5"></i> SSH 密钥
                    </span>
                    {% endif %}
                </td>
                <td class="px-6 py-4">{{ cred.username }}</td>
                <td class="px-6 py-4 font-mono text-xs text-slate-500">
                    {% if cred.type == 'password' %}
                    ●●●●●●●●
                    {% else %}
                    RSA Private Key...
                    {% endif %}
                </td>
                <td class="px-6 py-4 text-right">
                    <div class="flex items-center justify-end space-x-2">
                        <!-- Edit Button -->
                        <button class="p-1.5 text-slate-500 hover:text-blue-400 hover:bg-slate-700/50 rounded transition-colors"
                                title="编辑凭据"
                                hx-get="/views/credentials/{{ cred.id }}/edit"
                                hx-target="#modal-container">
                            <i data-lucide="edit" class="w-4 h-4"></i>
                        </button>
                        
                        <!-- Delete Button -->
                        <button class="p-1.5 text-slate-500 hover:text-rose-400 hover:bg-slate-700/50 rounded transition-colors"
                                title="删除凭据"
                                hx-delete="/api/credentials/{{ cred.id }}" hx-target="#main-content" hx-confirm="确定删除该凭据吗？">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
